version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: db
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: api

    env_file:
      - .env

    command: ["./entrypoint.sh"]

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "8000:8000"

volumes:
  postgres_data:
